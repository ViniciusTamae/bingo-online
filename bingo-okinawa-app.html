<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bingo Okinawa — SOBA 2026</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    min-height: 100vh;
  }

  body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(160deg, #1a1a40 0%, #270082 50%, #7a0bc0 100%);
    background-attachment: fixed;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 24px 16px 8px;
  }

  header h1 {
    font-size: 2.2rem;
    text-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
  }

  .btn-transmissao {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 16px;
    border: none;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-transmissao:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  /* ---------- Formulário ---------- */
  .painel-entrada {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  #form-numero {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  #input-numero {
    width: 240px;
    padding: 14px 18px;
    font-size: 1.2rem;
    border: none;
    border-radius: 12px;
    outline: none;
    text-align: center;
  }

  #form-numero button {
    padding: 14px 28px;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: #fa58b6;
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }

  #form-numero button:hover {
    background: #ff7ac6;
    transform: scale(1.05);
  }

  .erro {
    color: #ffb3b3;
    font-weight: bold;
  }

  /* ---------- Palco / animação ---------- */
  .palco {
    min-height: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
    overflow: hidden;
  }

  .dica {
    opacity: 0.7;
    font-size: 1.1rem;
  }

  .pedra-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  @keyframes subir {
    0% {
      transform: translateY(300px) scale(0.3);
      opacity: 0;
    }
    60% {
      transform: translateY(-30px) scale(1.1);
      opacity: 1;
    }
    80% {
      transform: translateY(10px) scale(0.97);
    }
    100% {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
  }

  @keyframes aparecer {
    from {
      opacity: 0;
      transform: translateY(15px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .letra-bingo {
    font-size: 1.6rem;
    font-weight: bold;
    letter-spacing: 2px;
    color: #ffd700;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    opacity: 0;
    animation: aparecer 0.5s ease-out 0.9s forwards;
  }

  .pedra {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 25%, #ffffff, #d9d9d9 55%, #9e9e9e);
    box-shadow:
      inset -10px -14px 24px rgba(0, 0, 0, 0.35),
      inset 10px 12px 20px rgba(255, 255, 255, 0.8),
      0 14px 30px rgba(0, 0, 0, 0.5);
    animation: subir 0.9s cubic-bezier(0.22, 1.2, 0.36, 1) forwards;
  }

  .pedra::before {
    content: "";
    position: absolute;
    width: 62%;
    height: 62%;
    border-radius: 50%;
    background: #fff;
    box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.2);
  }

  .pedra span {
    position: relative;
    z-index: 2;
    font-size: 4rem;
    font-weight: 900;
    color: #1a1a40;
  }

  .pedra.cor-b { background: radial-gradient(circle at 30% 25%, #7ec8ff, #1e88e5 60%, #0d47a1); }
  .pedra.cor-i { background: radial-gradient(circle at 30% 25%, #ff8a80, #e53935 60%, #8e0000); }
  .pedra.cor-n { background: radial-gradient(circle at 30% 25%, #fff59d, #fdd835 60%, #b8860b); }
  .pedra.cor-g { background: radial-gradient(circle at 30% 25%, #a5d6a7, #43a047 60%, #1b5e20); }
  .pedra.cor-o { background: radial-gradient(circle at 30% 25%, #ce93d8, #8e24aa 60%, #4a148c); }

  .nome-pessoa {
    font-size: 1.8rem;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
    opacity: 0;
    animation: aparecer 0.6s ease-out 1.1s forwards;
    text-align: center;
  }

  .telefone-pessoa {
    font-size: 1.1rem;
    color: rgba(255, 255, 255, 0.85);
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    opacity: 0;
    animation: aparecer 0.6s ease-out 1.3s forwards;
    text-align: center;
    margin-top: 12px;
  }

  /* ---------- Histórico ---------- */
  .historico h2 {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    font-size: 1.3rem;
  }

  #btn-limpar {
    font-size: 0.85rem;
    padding: 6px 12px;
    border: none;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }

  #btn-limpar:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  .tabuleiro {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    gap: 6px;
    padding-bottom: 32px;
  }

  .tabuleiro .celula {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    font-size: 0.95rem;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.5);
    transition: all 0.3s;
    cursor: pointer;
  }

  .tabuleiro .celula:hover:not(.sorteado) {
    background: rgba(255, 255, 255, 0.35);
    color: #fff;
    transform: scale(1.15);
  }

  .tabuleiro .celula.sorteado {
    cursor: default;
  }

  .tabuleiro .celula.sorteado {
    background: #ffd700;
    color: #1a1a40;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.7);
    transform: scale(1.08);
  }

  /* ---------- Modo transmissão (só a pedra na tela) ---------- */
  body.modo-transmissao header h1,
  body.modo-transmissao .painel-entrada,
  body.modo-transmissao .historico,
  body.modo-transmissao .dica {
    display: none;
  }

  /* Janela aberta pelo botão: esconde tudo, inclusive o botão */
  body.janela-transmissao header {
    display: none;
  }

  body.modo-transmissao .palco {
    min-height: calc(100vh - 120px);
  }

  body.modo-transmissao .pedra {
    width: 260px;
    height: 260px;
  }

  body.modo-transmissao .pedra span {
    font-size: 6rem;
  }

  body.modo-transmissao .letra-bingo {
    font-size: 2.4rem;
  }

  body.modo-transmissao .nome-pessoa {
    font-size: 2.6rem;
  }

  body.modo-transmissao .telefone-pessoa {
    font-size: 1.8rem;
  }

  /* ---------- Pop-up de confirmação ---------- */
  .modal-overlay[hidden] {
    display: none;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }

  .modal {
    background: linear-gradient(160deg, #2a1a5e, #3d1478);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 18px;
    padding: 28px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    animation: aparecer 0.25s ease-out;
  }

  .modal h3 {
    font-size: 1.4rem;
    margin-bottom: 10px;
  }

  .modal p {
    opacity: 0.85;
    margin-bottom: 4px;
  }

  .modal-botoes {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 22px;
  }

  .modal-botoes button {
    padding: 12px 22px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }

  .modal-botoes button:hover {
    transform: scale(1.05);
  }

  .btn-cancelar {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  .btn-cancelar:hover {
    background: rgba(255, 255, 255, 0.3);
  }

  .btn-confirmar {
    background: #e53935;
    color: #fff;
  }

  .btn-confirmar:hover {
    background: #ff5252;
  }

  @media (max-width: 640px) {
    .tabuleiro {
      grid-template-columns: repeat(10, 1fr);
    }

    .pedra {
      width: 150px;
      height: 150px;
    }

    .pedra span {
      font-size: 3.2rem;
    }
  }
</style>
</head>
<body>
<header>
  <h1>🎱 Bingo Okinawa</h1>
  <button class="btn-transmissao" id="btn-modo">📺 Ver como fica na transmissão</button>
</header>

<main>
  <section class="painel-entrada">
    <form id="form-numero" autocomplete="off">
      <input
        type="number"
        id="input-numero"
        min="1"
        max="75"
        placeholder="Digite um número (1 a 75)"
        required
      />
      <button type="submit">Enviar</button>
    </form>
    <p id="mensagem-erro" class="erro" hidden></p>
  </section>

  <section class="palco" id="palco">
    <p class="dica" id="dica">Digite um número acima para sortear a pedra 👆</p>
  </section>

  <section class="historico">
    <h2>
      Números sorteados
      <button id="btn-limpar" title="Recomeçar o jogo">🔄 Reiniciar</button>
    </h2>
    <div class="tabuleiro" id="tabuleiro"></div>
  </section>
</main>

<div class="modal-overlay" id="modal-reiniciar" hidden>
  <div class="modal">
    <h3>🔄 Reiniciar o jogo?</h3>
    <p>Todos os números sorteados serão apagados.</p>
    <div class="modal-botoes">
      <button id="btn-cancelar-reinicio" class="btn-cancelar">Cancelar</button>
      <button id="btn-confirmar-reinicio" class="btn-confirmar">Sim, reiniciar</button>
    </div>
  </div>
</div>

  };

  // ---------- Utilidades ----------
  function letraDoNumero(n) {
    if (n <= 15) return "B";
    if (n <= 30) return "I";
    if (n <= 45) return "N";
    if (n <= 60) return "G";
    return "O";
  }

  function criarPedraElemento(numero) {
    const letra = letraDoNumero(numero);
    const nome = NOMES[numero] || "";
    const telefone = TELEFONES[numero] || "";

    const container = document.createElement("div");
    container.className = "pedra-container";

    const letraEl = document.createElement("div");
    letraEl.className = "letra-bingo";
    letraEl.textContent = letra + " - " + numero;

    const pedraEl = document.createElement("div");
    pedraEl.className = "pedra cor-" + letra.toLowerCase();

    const numeroEl = document.createElement("span");
    numeroEl.textContent = numero;
    pedraEl.appendChild(numeroEl);

    const nomeEl = document.createElement("div");
    nomeEl.className = "nome-pessoa";
    nomeEl.textContent = nome;

    container.appendChild(letraEl);
    container.appendChild(pedraEl);
    container.appendChild(nomeEl);

    if (telefone) {
      const telEl = document.createElement("div");
      telEl.className = "telefone-pessoa";
      telEl.textContent = "📞 " + telefone;
      container.appendChild(telEl);
    }

    return container;
  }

  // ---------- Estado (com proteção caso o navegador bloqueie o armazenamento) ----------
  function lerSorteados() {
    try {
      return JSON.parse(localStorage.getItem("bingo-sorteados") || "[]");
    } catch (e) {
      return [];
    }
  }

  function salvarSorteados() {
    try {
      localStorage.setItem("bingo-sorteados", JSON.stringify(sorteados));
    } catch (e) {
      /* sem armazenamento disponível — o jogo continua só em memória */
    }
  }

  let sorteados = lerSorteados();

  // ---------- Elementos ----------
  const form = document.getElementById("form-numero");
  const input = document.getElementById("input-numero");
  const mensagemErro = document.getElementById("mensagem-erro");
  const dica = document.getElementById("dica");
  const palco = document.getElementById("palco");
  const tabuleiro = document.getElementById("tabuleiro");
  const btnLimpar = document.getElementById("btn-limpar");
  const btnModo = document.getElementById("btn-modo");

  // ---------- Tabuleiro (clique na bolinha para sortear) ----------
  function montarTabuleiro() {
    tabuleiro.innerHTML = "";
    for (let n = 1; n <= 75; n++) {
      const celula = document.createElement("div");
      celula.className = "celula";
      celula.id = "celula-" + n;
      celula.textContent = n;
      celula.title = "Clique para sortear o " + n;
      if (sorteados.includes(n)) celula.classList.add("sorteado");
      celula.addEventListener("click", () => realizarSorteio(n));
      tabuleiro.appendChild(celula);
    }
  }

  function mostrarErro(texto) {
    mensagemErro.textContent = texto;
    mensagemErro.hidden = false;
  }

  function sortearPedra(numero) {
    dica.hidden = true;
    const antigo = palco.querySelector(".pedra-container");
    if (antigo) antigo.remove();
    palco.appendChild(criarPedraElemento(numero));
  }

  // ---------- Sorteio (pelo formulário ou pelo clique no tabuleiro) ----------
  function realizarSorteio(numero) {
    mensagemErro.hidden = true;

    if (isNaN(numero) || numero < 1 || numero > 75) {
      mostrarErro("Digite um número válido entre 1 e 75.");
      return;
    }

    if (sorteados.includes(numero)) {
      mostrarErro("O número " + numero + " já foi sorteado!");
      return;
    }

    sorteados.push(numero);
    salvarSorteados();

    sortearPedra(numero);
    avisarTransmissao(numero);
    document.getElementById("celula-" + numero).classList.add("sorteado");

    input.value = "";
    input.focus();
  }

  form.addEventListener("submit", (evento) => {
    evento.preventDefault();
    realizarSorteio(parseInt(input.value, 10));
  });

  // Grava a última pedra para a janela de transmissão acompanhar
  function avisarTransmissao(numero) {
    try {
      localStorage.setItem(
        "bingo-ultimo",
        JSON.stringify({ numero: numero, ts: Date.now() })
      );
    } catch (e) {
      /* sem armazenamento disponível */
    }
  }

  // ---------- Reiniciar (com pop-up de confirmação) ----------
  const modalReiniciar = document.getElementById("modal-reiniciar");
  const btnCancelarReinicio = document.getElementById("btn-cancelar-reinicio");
  const btnConfirmarReinicio = document.getElementById("btn-confirmar-reinicio");

  btnLimpar.addEventListener("click", () => {
    modalReiniciar.hidden = false;
  });

  btnCancelarReinicio.addEventListener("click", () => {
    modalReiniciar.hidden = true;
  });

  modalReiniciar.addEventListener("click", (evento) => {
    if (evento.target === modalReiniciar) modalReiniciar.hidden = true;
  });

  document.addEventListener("keydown", (evento) => {
    if (evento.key === "Escape") modalReiniciar.hidden = true;
  });

  btnConfirmarReinicio.addEventListener("click", () => {
    modalReiniciar.hidden = true;
    sorteados = [];
    salvarSorteados();
    try {
      localStorage.removeItem("bingo-ultimo");
    } catch (e) {}
    montarTabuleiro();
    const container = palco.querySelector(".pedra-container");
    if (container) container.remove();
    dica.hidden = false;
  });

  // ---------- Modo transmissão ----------
  // O botão abre a tela de transmissão em OUTRA janela (a mesma página
  // com #transmissao no endereço). A janela nova só mostra a pedra e
  // acompanha os sorteios feitos na janela principal.
  const emJanelaTransmissao = location.hash === "#transmissao";

  if (emJanelaTransmissao) {
    document.body.classList.add("modo-transmissao", "janela-transmissao");

    let ultimoTs = null;
    function verificarSorteio() {
      let dados = null;
      try {
        dados = JSON.parse(localStorage.getItem("bingo-ultimo") || "null");
      } catch (e) {}

      if (!dados) {
        if (ultimoTs !== null) {
          ultimoTs = null;
          const container = palco.querySelector(".pedra-container");
          if (container) container.remove();
        }
        return;
      }

      if (dados.ts !== ultimoTs) {
        ultimoTs = dados.ts;
        sortearPedra(dados.numero);
      }
    }

    window.addEventListener("storage", verificarSorteio);
    setInterval(verificarSorteio, 400);
    verificarSorteio();
  } else {
    btnModo.addEventListener("click", () => {
      const url = location.href.split("#")[0] + "#transmissao";
      const janela = window.open(url, "_blank");
      if (!janela) {
        // Pop-up bloqueado pelo navegador: alterna na própria página
        const ligado = document.body.classList.toggle("modo-transmissao");
        btnModo.textContent = ligado
          ? "⬅️ Voltar para o controle"
          : "📺 Ver como fica na transmissão";
      }
    });
  }

  montarTabuleiro();
</script>
</body>
</html>
