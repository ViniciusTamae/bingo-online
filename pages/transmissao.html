<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bingo Beneficente — Transmissão</title>
  <link rel="icon" type="image/png" href="../assets/img/emblema-okinawa-marilia.png" />
  <link rel="stylesheet" href="../src/style.css" />
  <style>
    /* Tela de captura para o telão (OBS) — mesma identidade visual do
       evento, com marca discreta no topo e brilho atrás da pedra para
       destacar o número mesmo à distância. */
    body.transmissao {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Mascote (leão comendo soba) como selinho circular em dois
       cantos — mais espaço disponível aqui do que na tela de
       controle, então o selo fica maior. */
    body.transmissao::before,
    body.transmissao::after {
      content: "";
      position: absolute;
      width: 150px;
      height: 150px;
      background-image: url("../assets/img/mascote-shishi-soba.png");
      background-size: cover;
      background-position: center 20%;
      border-radius: 50%;
      box-shadow: 0 0 0 5px #fff, 0 0 0 9px var(--dourado-linha), 0 10px 24px var(--sombra);
      pointer-events: none;
      z-index: 1;
    }

    body.transmissao::before {
      top: 28px;
      left: 28px;
      transform: rotate(-8deg);
    }

    body.transmissao::after {
      bottom: 28px;
      right: 28px;
      transform: rotate(8deg);
    }

    /* Pétalas de cerejeira flutuando ao fundo — o telão fica parado
       na maior parte do evento (entre um número e outro), e essa
       deriva lenta mantém a tela viva sem competir com o número. Usa
       a mesma cor "sakura" (--col-o) já reservada para a coluna O. */
    .petalas {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .petala {
      position: absolute;
      top: -8vh;
      width: 16px;
      height: 16px;
      background: var(--col-o);
      opacity: 0.5;
      border-radius: 0% 70% 70% 70%;
      animation: cair-petala linear infinite;
    }

    @keyframes cair-petala {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
      }
      50% {
        transform: translateY(55vh) translateX(40px) rotate(180deg);
      }
      100% {
        transform: translateY(118vh) translateX(-30px) rotate(360deg);
      }
    }

    .petala:nth-child(1) { left: 2%; width: 12px; height: 12px; animation-duration: 19s; animation-delay: -2s; }
    .petala:nth-child(2) { left: 8%; width: 20px; height: 20px; animation-duration: 24s; animation-delay: -9s; opacity: 0.35; }
    .petala:nth-child(3) { left: 15%; width: 14px; height: 14px; animation-duration: 17s; animation-delay: -4s; }
    .petala:nth-child(4) { left: 22%; width: 10px; height: 10px; animation-duration: 22s; animation-delay: -12s; opacity: 0.4; }
    .petala:nth-child(5) { left: 29%; width: 18px; height: 18px; animation-duration: 26s; animation-delay: -6s; }
    .petala:nth-child(6) { left: 36%; width: 13px; height: 13px; animation-duration: 20s; animation-delay: -15s; opacity: 0.35; }
    .petala:nth-child(7) { left: 43%; width: 16px; height: 16px; animation-duration: 23s; animation-delay: -1s; }
    .petala:nth-child(8) { left: 50%; width: 11px; height: 11px; animation-duration: 18s; animation-delay: -10s; opacity: 0.4; }
    .petala:nth-child(9) { left: 57%; width: 19px; height: 19px; animation-duration: 25s; animation-delay: -7s; }
    .petala:nth-child(10) { left: 64%; width: 13px; height: 13px; animation-duration: 21s; animation-delay: -13s; opacity: 0.4; }
    .petala:nth-child(11) { left: 71%; width: 15px; height: 15px; animation-duration: 20s; animation-delay: -5s; }
    .petala:nth-child(12) { left: 78%; width: 11px; height: 11px; animation-duration: 24s; animation-delay: -17s; opacity: 0.35; }
    .petala:nth-child(13) { left: 85%; width: 18px; height: 18px; animation-duration: 18s; animation-delay: -3s; }
    .petala:nth-child(14) { left: 92%; width: 12px; height: 12px; animation-duration: 22s; animation-delay: -11s; opacity: 0.4; }
    .petala:nth-child(15) { left: 97%; width: 16px; height: 16px; animation-duration: 26s; animation-delay: -8s; }
    .petala:nth-child(16) { left: 11%; width: 13px; height: 13px; animation-duration: 21s; animation-delay: -19s; opacity: 0.4; }
    .petala:nth-child(17) { left: 33%; width: 17px; height: 17px; animation-duration: 19s; animation-delay: -14s; }
    .petala:nth-child(18) { left: 61%; width: 12px; height: 12px; animation-duration: 25s; animation-delay: -6.5s; opacity: 0.35; }
    .petala:nth-child(19) { left: 74%; width: 15px; height: 15px; animation-duration: 17s; animation-delay: -16s; }
    .petala:nth-child(20) { left: 46%; width: 10px; height: 10px; animation-duration: 23s; animation-delay: -9.5s; opacity: 0.4; }

    /* Tudo aqui escala com vmin (logo, texto, espaçamentos) em vez de
       usar px fixo: sem isso, em janelas/resoluções menores o texto
       quebrava linha (sem espaço pro tamanho fixo dele) e o selo
       crescia em altura só por baixo — a logo, com tamanho fixo,
       ficava centralizada nesse bloco mais alto e parecia "descer"
       por cima do texto. Com nowrap + clamp(), texto e logo encolhem
       juntos e nunca quebram linha. */
    .marca-evento {
      position: fixed;
      top: clamp(16px, 3vmin, 36px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: clamp(10px, 2vmin, 20px);
      padding: clamp(8px, 1.6vmin, 12px) clamp(16px, 3vmin, 28px);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid var(--dourado-linha);
      border-radius: var(--radius-pill);
      box-shadow: 0 8px 24px var(--sombra);
      z-index: 2;
      max-width: 92vw;
    }

    .marca-evento img {
      flex-shrink: 0;
      width: clamp(24px, 4vmin, 36px);
      height: clamp(24px, 4vmin, 36px);
      object-fit: cover;
      border-radius: 50%;
    }

    .marca-evento .textos {
      text-align: left;
      line-height: 1.25;
    }

    .marca-evento .titulo {
      font-family: var(--font-titulo);
      font-weight: 700;
      font-size: clamp(0.85rem, 2.2vmin, 1.1rem);
      color: var(--texto);
      white-space: nowrap;
    }

    .marca-evento .subtitulo {
      font-family: var(--font-corpo);
      font-weight: 600;
      font-size: clamp(0.6rem, 1.4vmin, 0.75rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--vermelho-escuro);
      white-space: nowrap;
    }

    body.transmissao .palco {
      position: relative;
      min-height: 100vh;
      margin: 0;
      z-index: 1;
    }

    /* Diâmetro-mestre da pedra no telão: escala com o menor lado da
       tela (vmin) para caber tanto em projeções 16:9 quanto 4:3, com
       piso e teto para não ficar minúsculo nem estourar a moldura. */
    body.transmissao {
      --pedra-d: clamp(300px, 34vmin, 520px);
    }

    /* Mensagem de espera, visível até o primeiro número ser sorteado */
    .placeholder-espera {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      opacity: 0.75;
    }

    .placeholder-espera svg {
      width: 80px;
      height: 80px;
    }

    .placeholder-espera p {
      font-family: var(--font-titulo);
      font-weight: 600;
      font-size: 1.6rem;
      color: var(--texto-dim);
    }

    .palco:has(.pedra-container) .placeholder-espera {
      display: none;
    }

    body.transmissao .pedra-container {
      position: relative;
      z-index: 1;
    }

    /* Halo pulsante atrás da pedra: dá profundidade ao círculo e ajuda
       a leitura à distância, sem usar scale() (ver nota mais abaixo
       sobre o bug de glifo corrompido — aqui é seguro pois anima um
       pseudo-elemento vazio, não o texto do número). */
    body.transmissao .pedra-container::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: var(--pedra-d);
      height: var(--pedra-d);
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(244, 197, 66, 0.55) 0%, rgba(214, 40, 40, 0.18) 55%, transparent 75%);
      filter: blur(18px);
      z-index: 0;
      animation: respirar-halo 2.6s ease-in-out infinite;
    }

    body.transmissao .pedra,
    body.transmissao .letra-bingo {
      position: relative;
      z-index: 1;
    }

    @keyframes respirar-halo {
      0%, 100% {
        opacity: 0.7;
      }
      50% {
        opacity: 1;
      }
    }

    /* Mesmo relevo 3D da tela de controle (.pedra base, em
       style.css), só com o aro e o halo escalando com --pedra-d em
       vez de px fixo — precisa caber tanto numa projeção pequena
       quanto num telão real. O halo SEM deslocamento (0 0, não
       "0 14px") é proposital: uma sombra só pra baixo deixava o topo
       da bola com uma transição seca, lendo como um corte reto bem
       em cima dela; com blur simétrico a borda funde com o fundo por
       igual. */
    body.transmissao .pedra {
      width: var(--pedra-d);
      height: var(--pedra-d);
      box-shadow:
        inset calc(var(--pedra-d) * -0.045) calc(var(--pedra-d) * -0.055) calc(var(--pedra-d) * 0.1) rgba(126, 79, 15, 0.35),
        inset calc(var(--pedra-d) * 0.027) calc(var(--pedra-d) * 0.027) calc(var(--pedra-d) * 0.064) rgba(255, 255, 255, 0.55),
        0 0 26px rgba(43, 33, 12, 0.3);
    }

    /* Anel de gradiente (mesma técnica de .pedra::after em
       style.css), com espessura proporcional a --pedra-d em vez de
       fixa em px. */
    body.transmissao .pedra::after {
      inset: calc(var(--pedra-d) * -0.018);
      padding: calc(var(--pedra-d) * 0.018);
    }

    /* Fonte proporcional ao diâmetro da pedra: mesmo com "75" (2
       dígitos), o texto nunca encosta na borda do círculo. */
    body.transmissao .pedra span {
      font-size: calc(var(--pedra-d) * 0.365);
    }

    body.transmissao .letra-bingo {
      font-size: clamp(2.4rem, 4.6vmin, 3.6rem);
      padding: clamp(10px, 1.4vmin, 18px) clamp(30px, 4.4vmin, 52px);
    }

    /* Largura máxima + quebra de linha: nomes longos descem para a
       segunda linha em vez de estourar a tela ou serem cortados. */
    body.transmissao .nome-pessoa {
      font-size: clamp(2.2rem, 4.6vmin, 3.6rem);
      max-width: min(92vw, 1400px);
      line-height: 1.2;
      overflow-wrap: break-word;
      padding-inline: 24px;
    }

    /* Placa dourada por trás do nome do contemplado: o nome sorteado
       é a informação que decide quem ganha, então ganha o mesmo
       tratamento de "selo" usado no resto da identidade (pílula
       branca + borda dourada), em vez de ficar só flutuando no ar. */
    body.transmissao .nome-pessoa:not(.sem-nome) {
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid var(--dourado-linha);
      border-radius: var(--radius-pill);
      padding: 14px clamp(28px, 4vmin, 48px);
      box-shadow: 0 10px 30px var(--sombra);
    }

    body.transmissao .telefone-pessoa {
      font-size: clamp(1.6rem, 2.6vmin, 2.3rem);
    }
  </style>
</head>
<body class="transmissao">
  <div class="petalas" aria-hidden="true">
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
    <span class="petala"></span>
  </div>

  <div class="marca-evento">
    <img src="../assets/img/emblema-okinawa-marilia.png" alt="Emblema Okinawa Marília" />
    <div class="textos">
      <p class="titulo">Bingo Beneficente</p>
      <p class="subtitulo">18º Festa do Soba Okinawa</p>
    </div>
  </div>

  <section class="palco" id="palco">
    <div class="placeholder-espera">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle cx="50" cy="50" r="47" fill="none" stroke="#F4C542" stroke-width="3" stroke-dasharray="6 8" />
        <g fill="#e07a93" fill-opacity="0.7">
          <ellipse cx="50" cy="34" rx="10" ry="15" />
          <ellipse cx="50" cy="34" rx="10" ry="15" transform="rotate(72 50 50)" />
          <ellipse cx="50" cy="34" rx="10" ry="15" transform="rotate(144 50 50)" />
          <ellipse cx="50" cy="34" rx="10" ry="15" transform="rotate(216 50 50)" />
          <ellipse cx="50" cy="34" rx="10" ry="15" transform="rotate(288 50 50)" />
        </g>
        <circle cx="50" cy="50" r="7" fill="#F4C542" />
      </svg>
      <p>Aguardando o próximo número…</p>
    </div>
  </section>

  <script src="../src/nomes.js"></script>
  <script src="../src/pedra.js"></script>
  <script>
    // A tela de transmissão fica observando o último número sorteado
    // (gravado pela tela de controle no localStorage) e anima a pedra
    // sempre que ele muda. Funciona com as duas páginas abertas no
    // mesmo navegador.
    const palco = document.getElementById("palco");
    let ultimoTs = null;

    function mostrarPedra(numero) {
      const antigo = palco.querySelector(".pedra-container");
      if (antigo) antigo.remove();
      if (numero) palco.appendChild(criarPedraElemento(numero));
    }

    function verificar() {
      let dados;
      try {
        dados = JSON.parse(localStorage.getItem("bingo-ultimo") || "null");
      } catch (e) {
        dados = null;
      }

      if (!dados) {
        if (ultimoTs !== null) {
          ultimoTs = null;
          mostrarPedra(null);
        }
        return;
      }

      if (dados.ts !== ultimoTs) {
        ultimoTs = dados.ts;
        mostrarPedra(dados.numero);
      }
    }

    // Atualização instantânea quando outra aba grava no localStorage…
    window.addEventListener("storage", verificar);
    // …e verificação periódica como garantia (alguns navegadores não
    // disparam o evento entre arquivos locais).
    setInterval(verificar, 400);

    // Ao abrir, já mostra a última pedra sorteada (sem animar de novo
    // não é possível distinguir, então anima uma vez).
    verificar();
  </script>
</body>
</html>
