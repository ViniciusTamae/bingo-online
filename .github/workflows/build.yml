name: Build Windows exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # O nome do .exe vem da versão do package.json — sem isto, ela
      # fica desatualizada a cada tag (já aconteceu: builds da v1.0.4
      # em diante saíram todos nomeados "1.0.3"). Sincroniza com a
      # tag que disparou o workflow antes de empacotar.
      - name: Sincroniza a versão do package.json com a tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bingo-online-windows
          path: |
            dist/*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
